name: proxyline npm release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: npm-release
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.9.0
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.19.0
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check
        run: pnpm check

      - name: Dry-run package
        run: pnpm package:dry-run

      - name: Read package metadata
        id: package
        shell: bash
        run: |
          echo "name=$(node -p "require('./package.json').name")" >> "$GITHUB_OUTPUT"
          echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Publish to npm
        shell: bash
        run: |
          package="${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }}"
          if npm view "$package" version --registry https://registry.npmjs.org/ >/dev/null 2>&1; then
            echo "::notice::$package is already published."
            exit 0
          fi

          set +e
          log="$RUNNER_TEMP/npm-publish.log"
          npm publish --access public --provenance >"$log" 2>&1
          status=$?
          cat "$log"
          if [ "$status" -ne 0 ] && npm view "$package" version --registry https://registry.npmjs.org/ >/dev/null 2>&1; then
            echo "::notice::$package is already published."
            exit 0
          fi
          exit "$status"
